/* ボタン共通の背景設定を修正 */

}

        /* アニメーション定義 */
        @keyframes overlayFadeIn { from { opacity: 0; } to { opacity: 1; } }

<body>

<div class="guess-buttons" id="action-buttons">

    <div class="button-group">
        <button class="btn-action btn-high" onclick="makeGuess('high')"></button>

    <script>
        // ==========================================
        // データベース（API）連携の設定項目
        // ==========================================
        const USE_REAL_DB = true;
        const API_BASE_URL = 'https://welbnkxi.vercel.app';
        const buttonSound = new Audio("se/button.mp3"); // 共通クリック音
        const winSound     = new Audio("se/win.mp3");   // 勝利音
        const loseSound    = new Audio("se/lose.mp3");  // 敗北音
        function playSound(audio) {
            audio.currentTime = 0;
            audio.play().catch(e => console.log("再生エラー:", e));
        }

        async function fetchPlayerChips(playerId) {
            if (!USE_REAL_DB) {
                let localChips = localStorage.getItem(`player_${playerId}_chips`);
                if (localChips === null) {
                    localChips = 200;
                    localStorage.setItem(`player_${playerId}_chips`, localChips);
                }
                return parseInt(localChips, 10);
            }
            try {
                const numericId = Number(playerId);
                const response = await fetch(`${API_BASE_URL}/api/player/${numericId}`);
                if (!response.ok) throw new Error('Player fetch failed');
                
                const data = await response.json();
                return Number(data.chips);
            } catch (error) {
                console.error("DBからのデータ取得に失敗:", error);
                return 200;
            }
        }

        async function updatePlayerChipsDelta(playerId, delta) {
            if (!USE_REAL_DB) {
                let localChips = parseInt(localStorage.getItem(`player_${playerId}_chips`) || "200", 10);
                localChips += delta;
                localStorage.setItem(`player_${playerId}_chips`, localChips);
                return localChips;
            }
            try {
                const response = await fetch(`${API_BASE_URL}/api/chips`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        playerId: Number(playerId),
                        delta: Number(delta)
                    })
                });
                if (!response.ok) throw new Error('Chips update failed');

                const data = await response.json();
                return Number(data.chips);
            } catch (error) {
                console.error("DBへのチップ数更新(POST)に失敗しました:", error);
                return chips + delta;
            }
        }

        // ==========================================
        // ゲーム管理変数・ロジック
        // ==========================================
        let gameMode = 'normal';
        let score = 0;
        let chips = 0;
        let activePlayerId = "";
        let currentCard = null;
        let nextCard = null;
        let html5QrCode = null;
        const FIXED_BET = 200;

        let winStreak = 0;
        let potentialPayout = 0;
        const MAX_MULTIPLIER = 10;
        let currentScreen = 'screen-home';

        const suits = [
            { symbol: '♠', isRed: false }, { symbol: '♥', isRed: true },
            { symbol: '♦', isRed: true }, { symbol: '♣', isRed: false }
        ];
        const cardValues = [
            { display: 'A', value: 1 }, { display: '2', value: 2 }, { display: '3', value: 3 },
            { display: '4', value: 4 }, { display: '5', value: 5 }, { display: '6', value: 6 },
            { display: '7', value: 7 }, { display: '8', value: 8 }, { display: '9', value: 9 },
            { display: '10', value: 10 }, { display: 'J', value: 11 }, { display: 'Q', value: 12 },
            { display: 'K', value: 13 }
        ];

        function changeScreen(screenId) {
            document.querySelectorAll('.screen').forEach(screen => {
                screen.classList.remove('active');
            });
            document.getElementById(screenId).classList.add('active');
            currentScreen = screenId;
        }

        function selectCasinoMode() {
            document.getElementById('manual-error-msg').style.display = 'none';
            document.getElementById('manual-player-id').value = '';
            changeScreen('screen-qr');
            startQRScanner();
        }

        function startQRScanner() {
            if (typeof Html5Qrcode === 'undefined') {
                console.error("Html5Qrcodeライブラリが見つかりません");
                return;
            }
            html5QrCode = new Html5Qrcode("reader");
            const config = {
    fps: 60,
    qrbox: { width: 300, height: 300 }
};
            html5QrCode.start(
                { facingMode: "environment" },
                config,
                (decodedText) => {
                    handlePlayerScanned(decodedText);
                    stopQRScanner();
                },
                (errorMessage) => {}
            ).catch(err => {
                console.warn("カメラの起動に失敗しました: ", err);
            });
        }

        function stopQRScanner() {
            if (html5QrCode && html5QrCode.isScanning) {
                html5QrCode.stop().catch(err => console.error("Scanner stop error:", err));
            }
        }

        function cancelQRScanner() {
            stopQRScanner();
            changeScreen('screen-home');
        }

        function handleManualPlayerId() {
            const val = document.getElementById('manual-player-id').value.trim();
            const errMsg = document.getElementById('manual-error-msg');
            if (val) {
                errMsg.style.display = 'none';
                handlePlayerScanned(val);
                stopQRScanner();
            } else {
                errMsg.style.display = 'block';
            }
        }

        async function handlePlayerScanned(playerId) {
            activePlayerId = playerId;
            document.getElementById('label-player-id').innerText = `ID: ${playerId}`;
            chips = await fetchPlayerChips(playerId);
            startGame('casino');
        }

        function getRandomCard() {
            const suit = suits[Math.floor(Math.random() * suits.length)];
            const valueInfo = cardValues[Math.floor(Math.random() * cardValues.length)];
            return {
                suit: suit.symbol, isRed: suit.isRed,
                display: valueInfo.display, value: valueInfo.value
            };
        }

        function renderCard(elementId, card, isFaceDown = false) {
            const cardElement = document.getElementById(elementId);
            cardElement.innerHTML = '';
            
            if (isFaceDown) {
                cardElement.className = "card back";
                return;
            }

            cardElement.className = "card";
            const redClass = card.isRed ? 'red-suit' : '';

            cardElement.innerHTML = `
                <div class="card-corner top-left ${redClass}">
                    <div>${card.display}</div>
                    <div style="font-size: 0.6em;">${card.suit}</div>
                </div>
                <div class="card-center ${redClass}">${card.suit}</div>
                <div class="card-corner bottom-right ${redClass}">
                    <div>${card.display}</div>
                    <div style="font-size: 0.6em;">${card.suit}</div>
                </div>
            `;
        }

async function startGame(mode) {
            gameMode = mode;
            changeScreen('screen-game');
            hideResultOverlay();
            
            const modeLabel = document.getElementById('label-mode');
            const scoreLabel = document.getElementById('label-score');
            const chipsLabel = document.getElementById('label-chips');
            const actionButtons = document.getElementById('action-buttons');
            const progressContainer = document.getElementById('progress-container');

            if (mode === 'normal') {
                score = 0;
                document.getElementById('label-player-id').innerText = '';
                modeLabel.innerText = '通常モード';
                scoreLabel.innerText = `スコア: ${score}`;
                scoreLabel.style.display = 'block';
                chipsLabel.style.display = 'none';
                actionButtons.style.display = 'flex';
                progressContainer.style.display = 'none';
                
                initCards();
                document.getElementById('game-info-msg').innerText = '次のカードは、現在より大きい(HIGH)か小さい(LOW)か？';
            } else {
                winStreak = 0;
                potentialPayout = 0;
                modeLabel.innerText = 'カジノモード';
                chipsLabel.innerText = `チップ: ${chips}`;
                chipsLabel.style.display = 'block';
                scoreLabel.style.display = 'none';
                progressContainer.style.display = 'block';

                setupProgressDots();
                updateProgressBar();
                
                initCards();
                applyFixedBet();
            }
        }

        function initCards() {
            currentCard = getRandomCard();
            nextCard = getRandomCard();
            while (nextCard.value === currentCard.value) {
                nextCard = getRandomCard();
            }
            renderCard('card-current', currentCard, false);
            renderCard('card-next', null, true);
        }

        async function applyFixedBet() {
            const msgElement = document.getElementById('game-info-msg');
            const actionButtons = document.getElementById('action-buttons');

            chips = await updatePlayerChipsDelta(activePlayerId, -FIXED_BET);
            document.getElementById('label-chips').innerText = `チップ: ${chips}`;

            actionButtons.style.display = 'flex';
            msgElement.innerText = `【200チップベット完了】 1勝ごとに *2, *3... と倍率アップ！チャレンジ開始！`;
        }

        function setupProgressDots() {
            const dotsContainer = document.getElementById('progress-dots');
            dotsContainer.innerHTML = '';
            for (let i = 0; i < MAX_MULTIPLIER; i++) {
                const dot = document.createElement('div');
                dot.className = 'progress-dot';
                dotsContainer.appendChild(dot);
            }
        }

        function updateProgressBar() {
            const currentMultiplier = winStreak + 1;
            const clamped = Math.min(currentMultiplier, MAX_MULTIPLIER);
            const percent = (clamped / MAX_MULTIPLIER) * 200;

            document.getElementById('progress-bar-fill').style.width = `${percent}%`;
            document.getElementById('progress-label').innerText =
                clamped >= MAX_MULTIPLIER
                    ? `最大倍率到達！ ${clamped}倍`
                    : `現在の倍率: ${clamped}倍 (MAX ${MAX_MULTIPLIER}倍)`;
        }

async function makeGuess(prediction) {
    renderCard('card-next', nextCard, false);
    document.getElementById('action-buttons').style.display = 'none';

    const isWin = (prediction === 'high' && nextCard.value > currentCard.value) ||
                  (prediction === 'low' && nextCard.value < currentCard.value);

    const cardInfo = `現在のカード: ${currentCard.display}${currentCard.suit}<br>次のカード: ${nextCard.display}${nextCard.suit}`;

    // カードを見せるための「間」（ミリ秒単位、お好みで調整）
    const REVEAL_DELAY = 800;

    setTimeout(() => {
        if (isWin) {
            if (gameMode === 'normal') {
                score++;
                document.getElementById('label-score').innerText = `スコア: ${score}`;
                showWinOverlay(`正解！🎉`, cardInfo, `現在のスコア: ${score}`);
            } else {
                winStreak++;
                let multiplier = winStreak + 1;
                if (multiplier > MAX_MULTIPLIER) multiplier = MAX_MULTIPLIER;
                potentialPayout = FIXED_BET * multiplier;

                showWinOverlay(
                    `🎉 WIN !! 🎉`,
                    cardInfo,
                    `【現在 ${winStreak}連勝中！】 倍率: ${multiplier}倍<br>獲得予定: ${potentialPayout} チップ`
                );
            }
        } else {
            if (gameMode === 'normal') {
                showLoseOverlay(`💀 LOSE 💀`, cardInfo, `残念、はずれです！<br>最終スコア: ${score}`);
            } else {
                potentialPayout = 0;
                showLoseOverlay(
                    `💀 LOSE 💀`,
                    cardInfo,
                    `残念！予想が外れました。<br>獲得予定チップは 0 になりました。`
                );
            }
        }
    }, REVEAL_DELAY);
}

        function showWinOverlay(title, cardInfo, subtext) {
    playSound(winSound);
            const overlay = document.getElementById('result-overlay');
            const oTitle = document.getElementById('overlay-title');
            const oCardInfo = document.getElementById('overlay-card-info');
            const oSub = document.getElementById('overlay-sub');
            const oButtons = document.getElementById('overlay-buttons');

            overlay.className = "result-overlay win";
            oTitle.innerText = title;
            oCardInfo.innerHTML = cardInfo;
            oSub.innerHTML = subtext;

            oButtons.innerHTML = '';
            if (gameMode === 'normal') {
                oButtons.innerHTML = `
                    <button class="btn-huge btn-continue" onclick="continueChallenge()"></button>
                    <button class="btn-huge btn-collect" onclick="returnToHome()"></button>
                `;
            } else {
                const currentMultiplier = winStreak + 1;
                const nextMultiplier = currentMultiplier >= MAX_MULTIPLIER ? MAX_MULTIPLIER : currentMultiplier + 1;

                if (currentMultiplier >= MAX_MULTIPLIER) {
                    oButtons.innerHTML = `
                        <button class="btn-huge btn-collect" onclick="collectChips()"></button>
                    `;
                } else {
                    oButtons.innerHTML = `
                        <button class="btn-huge btn-continue" onclick="continueChallenge()"></button>
                        <button class="btn-huge btn-collect" onclick="collectChips()"></button>
                    `;makeGuess 
                }
            }
            overlay.style.display = 'flex';
        }

        function showLoseOverlay(title, cardInfo, subtext) {
    playSound(loseSound);
            const overlay = document.getElementById('result-overlay');
            const oTitle = document.getElementById('overlay-title');
            const oCardInfo = document.getElementById('overlay-card-info');
            const oSub = document.getElementById('overlay-sub');
            const oButtons = document.getElementById('overlay-buttons');

            overlay.className = "result-overlay lose";
            oTitle.innerText = title;
            oCardInfo.innerHTML = cardInfo;
            oSub.innerHTML = subtext;

            oButtons.innerHTML = `
                <button class="btn-huge btn-red" style="background-color: #e74c3c; color: white;" onclick="returnToHome()">タイトルへ戻る</button>
            `;
            overlay.style.display = 'flex';
        }

        function hideResultOverlay() {
            document.getElementById('result-overlay').style.display = 'none';
        }
function continueChallenge() {
            hideResultOverlay();
            
            currentCard = nextCard;
            nextCard = getRandomCard();
            while (nextCard.value === currentCard.value) {
                nextCard = getRandomCard();
            }

            renderCard('card-current', currentCard, false);
            renderCard('card-next', null, true);

            document.getElementById('action-buttons').style.display = 'flex';
            
            if (gameMode === 'normal') {
                document.getElementById('game-info-msg').innerText = '次のカードはHIGH？それともLOW？';
            } else {
                const currentMultiplier = winStreak + 1;
                document.getElementById('game-info-msg').innerText = `【現在: ${currentMultiplier}倍】 次を当てれば ${currentMultiplier + 1}倍にアップ！`;
                updateProgressBar();
            }
        }
        async function collectChips() {
            const overlay = document.getElementById('result-overlay');
            const oTitle = document.getElementById('overlay-title');
            const oCardInfo = document.getElementById('overlay-card-info');
            const oSub = document.getElementById('overlay-sub');
            const oButtons = document.getElementById('overlay-buttons');

            if (potentialPayout > 0) {
                oButtons.innerHTML = '<span style="font-size: 2rem; font-weight: bold; color: white;">通信中...</span>';
                
                chips = await updatePlayerChipsDelta(activePlayerId, potentialPayout);
                
                overlay.className = "result-overlay collect";
                oTitle.innerText = "COLLECTED!";
                oCardInfo.innerHTML = '';
                oSub.innerHTML = `見事チャレンジ成功！<br>${potentialPayout} チップを獲得しました！`;
                
                oButtons.innerHTML = `
                    <button class="btn-huge" style="background-color: #3498db; color: white; border-color: #fff;" onclick="returnToHome()">タイトルへ戻る</button>
                `;
            } else {
                returnToHome();
            }
        }

        function returnToHome() {
            hideResultOverlay();
            changeScreen('screen-home');
        }
        // ==========================================
        // 全ボタン共通のクリック音（イベント委譲）
        // ==========================================
        document.addEventListener('click', (e) => {
            const btn = e.target.closest('button');
            if (btn) {
                playSound(buttonSound);
            }
        }, true); // captureフェーズで拾うことで確実に検知

        // ==========================================
        // キーボードコントロール
        // ==========================================
        document.addEventListener('keydown', (event) => {
            const key = event.key.toLowerCase();
            
            if (key === 'a') {
                // 左側のボタンをクリック
                if (currentScreen === 'screen-home') {
                    document.querySelector('.btn-circle.btn-green').click();
                } else if (currentScreen === 'screen-qr') {
                    // QR画面では左側ボタンなし
                } else if (currentScreen === 'screen-game') {
                    // ゲーム画面内のアクティブなボタンを判定
                    const resultOverlay = document.getElementById('result-overlay');
                    if (resultOverlay.style.display === 'flex') {
                        // リザルト画面：左側のボタン
                        const buttons = resultOverlay.querySelectorAll('button');
                        if (buttons.length > 0) {
                            buttons[0].click();
                        }
                    } else {
                        // ゲームプレイ中：HIGH ボタン
                        document.querySelector('.btn-high').click();
                    }
                }
            } else if (key === 'l') {
                // 右側のボタンをクリック
                if (currentScreen === 'screen-home') {
                    document.querySelector('.btn-circle.btn-red').click();
                } else if (currentScreen === 'screen-qr') {
                    // QR画面では右側ボタンをクリック（決定ボタン）
                    document.querySelector('.manual-input-area .btn-action').click();
                } else if (currentScreen === 'screen-game') {
                    // ゲーム画面内のアクティブなボタンを判定
                    const resultOverlay = document.getElementById('result-overlay');
                    if (resultOverlay.style.display === 'flex') {
                        // リザルト画面：右側のボタン
                        const buttons = resultOverlay.querySelectorAll('button');
                        if (buttons.length > 1) {
                            buttons[buttons.length - 1].click();
                        } else if (buttons.length === 1) {
                            buttons[0].click();
                        }
                    } else {
                        // ゲームプレイ中：LOW ボタン
                        document.querySelector('.btn-low').click();
                    }
                }
            }
        });
    </script>
</body>
</html>
